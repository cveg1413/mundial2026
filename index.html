* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #f1f5f9; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

.header { background: linear-gradient(135deg, #16a34a 0%, #15803d 60%, #166534 100%); padding: 20px 16px 16px; }

.badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.badge { border-radius: 8px; padding: 3px 9px; font-size: 11px; font-weight: 600; }
.badge-tv { background: #ffffff33; border: 1px solid #ffffff88; color: #fff; }
.badge-cable { background: #ffffff22; border: 1px solid #ffffff55; color: #dcfce7; }

/* Status bar */
.status-bar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 6px 16px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #64748b; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
.status-dot.live { background: #ef4444; animation: pulse 1.5s infinite; }
.status-dot.ok { background: #16a34a; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Filtros */
.filtros { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #e2e8f0; padding: 10px 14px; box-shadow: 0 1px 4px #0001; }

.btn-toggle { border-radius: 20px; padding: 5px 13px; font-size: 13px; font-weight: 700; border: 2px solid; cursor: pointer; transition: all 0.15s; background: transparent; }
.btn-mexico { color: #16a34a; border-color: #16a34a88; }
.btn-mexico.active { background: #16a34a; color: #fff; border-color: #16a34a; }
.btn-abierta { color: #b45309; border-color: #b4530988; }
.btn-abierta.active { background: #b45309; color: #fff; border-color: #b45309; }
.btn-refresh { color: #6366f1; border-color: #6366f188; margin-left: auto; }
.btn-refresh.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.chips { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 2px; flex-wrap: nowrap; }
.chips::-webkit-scrollbar { display: none; }
.chip { border: none; border-radius: 14px; padding: 4px 11px; font-size: 12px; font-weight: 600; cursor: pointer; background: #e2e8f0; color: #64748b; white-space: nowrap; flex-shrink: 0; }
.chip.active-g { background: #16a34a; color: #fff; }
.chip.active-f { background: #3b82f6; color: #fff; }
.chips-grupo { margin-top: 7px; }

.content { max-width: 720px; margin: 0 auto; padding: 12px 12px 50px; }

.fecha-header { display: flex; align-items: center; gap: 10px; margin: 16px 0 7px; }
.fecha-line { height: 1px; flex: 1; background: #cbd5e1; }
.fecha-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.fecha-hoy { color: #16a34a; }

.partido { border-radius: 12px; margin-bottom: 6px; padding: 11px 12px; border: 1px solid #e2e8f0; background: #fff; box-shadow: 0 1px 2px #0001; transition: box-shadow 0.15s; }
.partido:active { box-shadow: 0 0 0 2px #16a34a44; }

.partido.elim { background: #eff6ff; border-color: #bfdbfe; }

.partido-inner { display: flex; align-items: center; gap: 8px; }

.hora { font-size: 15px; font-weight: 800; color: #1e293b; display: block; }
.grupo-tag { font-size: 10px; color: #94a3b8; }
.match-center { flex: 1; text-align: center; min-width: 0; }
.marcador { font-size: 22px; font-weight: 900; color: #16a34a; letter-spacing: 3px; display: block; line-height: 1.1; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none; white-space: nowrap; }

let marcadores = {};
let ultimaActualizacion = null;
let hayPartidosVivos = false;

// ─── ESTADO DE FILTROS ─────────────────────────────────────────────────────
let filtroMexico = false;
let filtroAbierta = false;
let filtroFase = "Todos";
let filtroGrupo = "Todos";

// ─── API ───────────────────────────────────────────────────────────────────
// API pública sin key - openfootball/worldcup.json (GitHub Raw, CORS abierto)
const API_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

async function actualizarMarcadores(manual = false) {
  const btn = document.getElementById('btnRefresh');
  btn.style.animation = 'spin 1s linear infinite';

  // Siempre partimos de resultados base confirmados
  marcadores = {...RESULTADOS_BASE};
  hayPartidosVivos = false;

  try {
    const res = await fetch(API_URL + '?t=' + Date.now(), {
      signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // openfootball usa estructura: data.matches[] o data.rounds[].matches[]
    let allMatches = [];
    if (Array.isArray(data.matches)) {
      allMatches = data.matches;
    } else if (Array.isArray(data.rounds)) {
      data.rounds.forEach(r => { if (r.matches) allMatches.push(...r.matches); });
    }

    allMatches.forEach(m => {
      const t1 = normalizar(m.team1?.name || m.team1 || '');
      const t2 = normalizar(m.team2?.name || m.team2 || '');

      // Score puede ser {ft:[gL,gV]} o score.ft
      let gL = null, gV = null;
      if (m.score) {
        const ft = m.score.ft || m.score.fullTime;
        if (Array.isArray(ft)) { gL = ft[0]; gV = ft[1]; }
        else if (ft && typeof ft === 'object') { gL = ft.home ?? ft[0]; gV = ft.away ?? ft[1]; }
        else if (typeof m.score === 'string') {
          const parts = m.score.split('-').map(Number);
          if (parts.length === 2) { gL = parts[0]; gV = parts[1]; }
        }
      }

      if (gL !== null && gV !== null && !isNaN(gL) && !isNaN(gV)) {
        const key = t1 + '-' + t2;
        marcadores[key] = { gL, gV, vivo: false, fin: true };
      }
    });

    ultimaActualizacion = new Date();
    const hora = ultimaActualizacion.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
    setStatus('ok', `Actualizado ${hora}`);
    if (manual) mostrarToast('✅ Marcadores actualizados');

  } catch (e) {
    console.warn('API error:', e.message);
    setStatus('err', 'Sin conexión — mostrando resultados guardados');
    if (manual) mostrarToast('⚠️ Sin conexión a la API');
  }

  btn.style.animation = '';
  render();

  // Refrescar cada 5 min
  clearTimeout(window._refreshTimer);
  window._refreshTimer = setTimeout(() => actualizarMarcadores(), 5 * 60 * 1000);
}

function normalizar(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]/g, '');
}

function buscarMarcador(p) {
  // 1. Por ID directo (RESULTADOS_BASE)
  if (p.id && marcadores[p.id]) return marcadores[p.id];

  // 2. Por nombre normalizado (API openfootball)
  const lN = normalizar(p.l.replace(/[^\w\s]/g,'').trim());
  const vN = normalizar(p.v.replace(/[^\w\s]/g,'').trim());

  // Búsqueda en todas las claves de marcadores
  for (const k of Object.keys(marcadores)) {
    const parts = k.split('-');
    if (parts.length < 2) continue;
    // La clave puede tener múltiples guiones (ej: "south-africa")
    // Tomamos todo como una sola cadena normalizada
    const kN = normalizar(k);
    // Verificar si los primeros 5 chars de local y visitante aparecen en la clave
    const lSlice = lN.replace(/\s/g,'').slice(0, 6);
    const vSlice = vN.replace(/\s/g,'').slice(0, 6);
    if (lSlice.length > 2 && vSlice.length > 2 && kN.includes(lSlice) && kN.includes(vSlice)) {
      const m = marcadores[k];
      if (m && m.gL !== null) return m;
    }
  }
  return null;
}

function setStatus(tipo, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot' + (tipo === 'ok' ? ' ok' : tipo === 'live' ? ' live' : '');
  txt.textContent = msg;
}

// ─── FILTROS ───────────────────────────────────────────────────────────────
function toggleMexico() {
  filtroMexico = !filtroMexico;
  document.getElementById('btnMexico').classList.toggle('active', filtroMexico);
  render();
}
function toggleAbierta() {
  filtroAbierta = !filtroAbierta;
  document.getElementById('btnAbierta').classList.toggle('active', filtroAbierta);
  render();
}
function setFase(f, el) {
  filtroFase = f;
  document.querySelectorAll('#chipsFase .chip').forEach(c => c.classList.remove('active-f'));
  el.classList.add('active-f');
  const showGrupos = f === 'Grupos' || f === 'Todos';
  document.getElementById('chipsGrupo').style.display = showGrupos ? 'flex' : 'none';
  if (!showGrupos) { filtroGrupo = 'Todos'; document.querySelector('#chipsGrupo .chip').classList.add('active-g'); }
  render();
}
function setGrupo(g, el) {
  filtroGrupo = g;
  document.querySelectorAll('#chipsGrupo .chip').forEach(c => c.classList.remove('active-g'));
  el.classList.add('active-g');
  render();
}

const GRUPOS_FASE = ["A","B","C","D","E","F","G","H","I","J","K","L"];
function esGrupo(g) { return GRUPOS_FASE.includes(g); }

function filtrar() {
  return partidos.filter(p => {
    if (filtroMexico && !p.mx) return false;
    if (filtroAbierta && !p.tv) return false;
    if (filtroFase === 'Grupos' && !esGrupo(p.g)) return false;
    if (filtroFase !== 'Todos' && filtroFase !== 'Grupos' && p.g !== filtroFase) return false;
    if (filtroGrupo !== 'Todos' && p.g !== filtroGrupo) return false;
    return true;
  });
}

function esHoy(f) {
  const hoy = new Date();
  const [y,m,d] = f.split('-').map(Number);
  return hoy.getFullYear() === y && hoy.getMonth()+1 === m && hoy.getDate() === d;
}

function formatFecha(f) {
  const [y,m,d] = f.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const hoy = esHoy(f);
  const txt = `${DIAS[date.getDay()]} ${d} ${MESES[m-1]}`;
  return hoy ? `<span class="fecha-hoy">📅 HOY — ${txt.toUpperCase()}</span>` : txt.toUpperCase();
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const data = filtrar();
  const content = document.getElementById('content');

  if (!data.length) {
    content.innerHTML = '<div class="empty"><div class="ico">⚽</div><p>No hay partidos con este filtro</p></div>';
    return;
  }

  const byDate = {};
  data.forEach(p => { if (!byDate[p.f]) byDate[p.f] = []; byDate[p.f].push(p); });
  const sorted = Object.entries(byDate).sort(([a],[b]) => a.localeCompare(b));

  let html = '';
  sorted.forEach(([fecha, ps]) => {
    html += `<div class="fecha-header"><div class="fecha-line"></div><span class="fecha-label">${formatFecha(fecha)}</span><div class="fecha-line"></div></div>`;

    ps.forEach(p => {
      const marc = buscarMarcador(p);
      const isElim = !esGrupo(p.g);
      let cls = p.mx ? 'partido mexico' : isElim ? 'partido elim' : 'partido';
      if (marc?.vivo) cls += ' en-vivo';

      const canales = p.c.split(',').map(s => s.trim());
      const principal = canales[0];
      const extra = canales.slice(1);
      const canalCls = p.tv ? 'canal-badge canal-tv' : 'canal-badge canal-cable';
      const canalIco = p.tv ? '📺' : '📡';
      const grupoTag = esGrupo(p.g) ? `G-${p.g}` : p.g;

      let marcadorHtml = '';
      if (marc) {
        const liveBadge = marc.vivo ? `<span class="live-badge">EN VIVO${marc.minuto ? ' '+marc.minuto+"'" : ''}</span>` : '';
        const marcCls = 'marcador' + (marc.vivo ? ' en-vivo' : '');
        marcadorHtml = `${liveBadge}<span class="${marcCls}">${marc.gL} — ${marc.gV}</span>`;
      }

      html += `
      <div class="${cls}">
        <div class="partido-inner">
          <div class="hora-box">
            <span class="hora">${p.h}</span>
            <span class="grupo-tag">${grupoTag}</span>
          </div>
          <div class="match-center">
            ${marcadorHtml}
            <div class="equipos">${p.l} <span class="sep">vs</span> ${p.v}</div>
            <div class="sede-txt">📍 ${p.s}</div>
          </div>
          <div class="canal-box">
            <span class="${canalCls}">${canalIco} ${principal}${extra.length ? ` <span style="opacity:.6">+${extra.length}</span>` : ''}</span>
          </div>
        </div>
        ${extra.length ? `<div class="canales-extra">También: ${extra.join(', ')}</div>` : ''}
      </div>`;
    });
  });

  html += `<div class="nota"><strong>ℹ️ Notas</strong><br>
    • Horarios en hora del Centro de México (CDT)<br>
    • Marcadores se actualizan automáticamente al abrir la app<br>
    • 🟢 En verde = TV Abierta gratis &nbsp; 🔵 En azul = Cable / ViX Premium</div>`;

  content.innerHTML = html;

  // Status de partidos vivos
  if (hayPartidosVivos) setStatus('live', 'Hay partidos en vivo — actualizando cada 2 min');
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
